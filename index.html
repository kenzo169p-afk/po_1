<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Trainer - Teachable Machine Clone</title>
    <meta name="description" content="Treinamento de imagens no navegador utilizando Transfer Learning e ml5.js">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="main.js" defer></script>
</head>
<body>
    <header>
        <h1>Teachable Machine Clone</h1>
    </header>

    <main class="container">
        <!-- Section 1: Coleta de Dados -->
        <section class="panel" id="collection-panel">
            <h2>1. Coleta de Dados</h2>
            <div id="classes-container">
            </div>
            <button id="add-class-btn" class="primary-btn">+ Adicionar Nova Classe</button>
            <div style="margin-top:20px; text-align: center;">
                <video id="webcam-video" autoplay playsinline width="224" height="224" style="border-radius: 8px; border: 1px solid #ccc;"></video>
            </div>
        </section>

        <!-- Section 2: Treinamento -->
        <section class="panel" id="training-panel">
            <h2>2. Treinamento</h2>
            <button id="train-btn" class="primary-btn" disabled>Treinar Modelo</button>
            
            <div class="progress-container">
                <p id="training-status">Aguardando dados...</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="training-progress" style="width: 0%;"></div>
                </div>
            </div>

            <details class="advanced-settings">
                <summary>Configurações Avançadas</summary>
                <div class="settings-group">
                    <label>Epochs: <input type="number" id="epochs-input" value="50" min="1"></label>
                    <label>Batch Size: <input type="number" id="batch-input" value="0.25" step="0.05" max="1"></label>
                    <label>Learning Rate: <input type="number" id="lr-input" value="0.0001" step="0.0001"></label>
                </div>
            </details>
        </section>

        <!-- Section 3: Preview -->
        <section class="panel" id="preview-panel">
            <h2>3. Teste</h2>
            
            <div class="preview-area">
                <button id="predict-btn" class="primary-btn" style="display:none;">Iniciar Previsão</button>
                <div id="prediction-results">
                    <!-- Barras de confiança aqui -->
                </div>
            </div>

            <button id="export-btn" class="secondary-btn" disabled>Exportar Modelo</button>
        </section>
    </main>

    <!-- Template for a class -->
    <template id="class-template">
        <div class="class-card">
            <div class="class-header">
                <input type="text" class="class-name" value="Nova Classe">
                <button class="delete-class-btn">&times;</button>
            </div>
            <div class="class-actions">
                <button class="capture-btn">📷 Webcam</button>
                <label class="upload-btn">
                    📁 Upload
                    <input type="file" accept="image/*" multiple style="display:none;">
                </label>
            </div>
            <p class="sample-count">Amostras: <span>0</span></p>
            <div class="samples-preview"></div>
        </div>
    </template>
</body>
</html>
